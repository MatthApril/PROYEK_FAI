<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Migoyugo - Strategic Board Game</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="halaman d-flex vw-100 vh-100">
      <!-- KONTEN UTAMA -->
      <main class="konten flex-grow-1 vh-100 p-3 overflow-hidden">
        <!-- LOGO BESAR -->
        <div class="logo-besar d-flex justify-content-center mb-3">
          <img src="assets/image.png" alt="Migoyugo" />
        </div>

        <div
          class="area-game d-flex justify-content-center align-items-start gap-3">
          <!-- PAPAN GAME -->
          <section class="kotak-game flex-shrink-0 rounded-1 overflow-hidden">
            <div
              class="bar-pemain d-flex align-items-center justify-content-between px-3 text-white">
              <div
                id="info-putih"
                class="d-flex align-items-center gap-2 rounded px-1">
                <div class="bidak putih rounded-circle"></div>
                <span>White</span>
                <span>Yugos: 0</span>
              </div>

              <!-- atur nya disini kalau mau hitung mundur -->
              <div class="waktu-putih fw-bold">10:00</div>
            </div>

            <div class="papan position-relative" id="papanGame">
              <!-- kotak-kotak papan 8x8 -->

              <!-- ANGKA OVERLAY -->
              <span class="angka angka-8">8</span>
              <span class="angka angka-7">7</span>
              <span class="angka angka-6">6</span>
              <span class="angka angka-5">5</span>
              <span class="angka angka-4">4</span>
              <span class="angka angka-3">3</span>
              <span class="angka angka-2">2</span>
              <span class="angka angka-1">1</span>

              <!-- HURUF OVERLAY -->
              <span class="huruf huruf-a">a</span>
              <span class="huruf huruf-b">b</span>
              <span class="huruf huruf-c">c</span>
              <span class="huruf huruf-d">d</span>
              <span class="huruf huruf-e">e</span>
              <span class="huruf huruf-f">f</span>
              <span class="huruf huruf-g">g</span>
              <span class="huruf huruf-h">h</span>
            </div>

            <div
              class="bar-pemain d-flex align-items-center justify-content-between px-3 text-white">
              <div
                id="info-hitam"
                class="d-flex align-items-center gap-2 rounded px-1">
                <div class="bidak hitam rounded-circle"></div>
                <span>Black</span>
                <span>Yugos: 0</span>
              </div>

              <!-- aturnya disini kalau mau hitung mundur -->
              <div class="waktu-hitam fw-bold">10:00</div>
            </div>
          </section>

          <!-- PANEL KANAN -->
          <aside class="panel flex-shrink-0">
            <div class="tombol-atas d-flex gap-2">
              <!-- nanti buat fungsi start game -->
              <button
                id="startGame"
                class="btn btn-success w-50 py-3 fw-bold fs-6 rounded-top rounded-bottom-0"
                onclick="startGame()">
                Start
              </button>

              <!-- nanti buat fungsi reset game -->
              <button
                class="btn btn-dark w-50 py-3 fw-bold fs-6 rounded-top rounded-bottom-0"
                onclick="resetPapan()">
                Reset
              </button>
            </div>

            <div class="isi-panel bg-white border border-top-0 p-3">
              <div class="d-block" id="config-panel">
                <div class="form-baris mb-3">
                  <label for="pilihanMusuh">Opponent:</label>

                  <select id="pilihanMusuh" class="form-select">
                    <option>Local Play</option>
                    <option>AI - Beginner</option>
                    <option>AI - Novice</option>
                    <option>AI - Intermediate</option>
                    <option>AI - Advanced</option>
                    <option>AI - Expert</option>
                    <option>AI - Master</option>
                  </select>
                </div>

                <div class="form-baris mb-3">
                  <label>Game Timer:</label>

                  <div class="timer-control d-flex align-items-center gap-2">
                    <span>Off</span>

                    <input type="checkbox" id="cekTimer" checked />

                    <label for="cekTimer" class="toggle">
                      <span></span>
                    </label>

                    <span>On</span>
                  </div>
                </div>

                <div class="timer-setting" id="timerSetting">
                  <div>
                    <label for="menit"
                      class="form-label d-block mb-2">Minutes:</label>

                    <select id="menit" class="form-select">
                      <option value="10">10</option>
                      <option value="15">15</option>
                      <option value="20">20</option>
                    </select>
                  </div>

                  <div>
                    <label for="increment"
                      class="form-label d-block mb-2">Increment:</label>

                    <select id="increment" class="form-select">
                      <option value="5">5 sec</option>
                      <option value="2">2 sec</option>
                      <option value="1">1 sec</option>
                      <option value="0">0 sec</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="d-none" id="history-panel">
                <div class="header-history d-flex justify-content-between">
                  <span class="fw-bold mb-2">Move History</span>
                </div>
                <div id="history-list" class="history-list mb-2">
                  <textarea
                    class="w-100 border border-secondary-subtle rounded p-2"
                    id="moveHistory"
                    readonly
                    rows="15"
                    style="
                      resize: none;
                      outline: none;
                      background-color: #fcfcfc;
                    "></textarea>
                </div>
                <div class="d-flex justify-content-center gap-4">
                  <button type="button" class="btn btn-primary" id="btnReview">
                    Review
                  </button>

                  <button type="button" class="btn btn-primary" id="btnUndo">
                    Undo
                  </button>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <div class="alert-container">
      <div
        class="alert-copy position-fixed shadow rounded-3 d-flex align-items-center gap-2 p-3"
        id="alertCopy">
        <div
          class="alert-icon rounded-circle d-flex align-items-center justify-content-center"></div>
        <div class="alert-text d-flex flex-column gap-1">
          <strong id="alertJudul">Judul Alert</strong>
          <span id="alertPesan">Pesan Alert</span>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/ai.js"></script>

    <div
      class="modal fade"
      id="resignModal"
      tabindex="-1"
      aria-labelledby="resignModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3 border-0">
          <div class="modal-body">
            <h2 class="fw-bold mb-4" id="resignModalLabel">
              ⚠️ Confirm Resignation
            </h2>

            <p class="fs-5 mb-4">Are you sure you want to resign this game?</p>
            <p class="fs-5 mb-4">Your opponent will be declared the winner.</p>

            <div class="d-flex justify-content-center gap-4">
              <button
                type="button"
                class="btn btn-danger fs-5 fw-bold"
                id="btnConfirmResign">
                🏳️ Yes, Resign
              </button>

              <button
                type="button"
                class="btn btn-success fs-5 fw-bold"
                data-bs-dismiss="modal">
                ⚔️ Continue Playing
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="gameOverModal"
      tabindex="-1"
      aria-labelledby="gameOverModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3 border-0">
          <div class="modal-body">
            <h2 class="fw-bold" id="gameOverModalLabel">Game Over</h2>

            <p class="fs-5 mb-4">White/Black wins with an Igo!</p>

            <div class="d-flex justify-content-center gap-4">
              <button
                type="button"
                class="btn btn-success fs-5 fw-bold"
                id="btnReviewGame">
                📋 Review Game
              </button>

              <button
                type="button"
                class="btn btn-dark fs-5 fw-bold"
                data-bs-dismiss="modal">
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
